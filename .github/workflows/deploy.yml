# ============================================================
# deploy.yml — NovaByte CI/CD Pipeline
# Builds tests pushes and deploys on every push to main
# ============================================================

name: Build and Deploy NovaByte App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI

env:
  ACR_NAME:          acrnovabytedev001
  CONTAINER_APP:     ca-novabyte-dev
  RESOURCE_GROUP:    rg-novabyte-dev
  IMAGE_NAME:        novabyte-app
  AZURE_TENANT_ID:   5f846636-437d-46ba-9152-d0632a997016

jobs:

  # ── Job 1: Build and Test ──────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest

      - name: Run basic health check test
        run: |
          cd app
          python -c "
          from app import app
          client = app.test_client()
          response = client.get('/health')
          assert response.status_code == 200
          print('Health check passed')
          response = client.get('/')
          assert response.status_code == 200
          print('Home route passed')
          print('All tests passed')
          "

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --file app/Dockerfile \
            app/

      - name: Verify Docker image
        run: |
          docker run --rm \
            --detach \
            --name test-container \
            --publish 8080:8080 \
            ${{ env.IMAGE_NAME }}:latest
          sleep 5
          curl --fail http://localhost:8080/health || exit 1
          echo "Container health check passed"
          docker stop test-container

  # ── Job 2: Push to ACR ────────────────────────────────────
  # Only runs on push to main — not on pull requests
  push-to-acr:
    name: Push to Azure Container Registry
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Login to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          docker build \
            --tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            --file app/Dockerfile \
            app/
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Show image digest
        run: |
          az acr repository show-tags \
            --name ${{ env.ACR_NAME }} \
            --repository ${{ env.IMAGE_NAME }} \
            --output table

  # ── Job 3: Deploy to Dev ───────────────────────────────────
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: push-to-acr
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify deployment
        run: |
          az containerapp show \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.latestRevisionFqdn" \
            --output tsv

  # ── Job 4: Deploy to Production ───────────────────────────
  # Requires manual approval before running
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy to Production Container Apps
        run: |
          az containerapp update \
            --name ca-novabyte-prod \
            --resource-group rg-novabyte-prod \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Confirm production deployment
        run: |
          echo "Production deployment complete"
          echo "Image: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
